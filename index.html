<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enterprise RCH | Auditoria 360 & NR-1</title>
    
    <!-- Bibliotecas de Base (Versões Estáveis) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0f172a; 
            margin: 0;
            color: #1e293b;
        }

        .glass-card { 
            background: #ffffff; 
            border-radius: 2.5rem; 
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-rch { 
            width: 100%; 
            padding: 1.1rem; 
            background-color: #f1f5f9; 
            border-radius: 1rem; 
            border: 2px solid transparent; 
            font-weight: 700; 
            text-transform: uppercase; 
            outline: none;
            transition: all 0.2s;
        }

        .input-rch:focus { border-color: #2563eb; background-color: white; }

        .btn-rch { 
            background-color: #2563eb; 
            color: white; 
            font-weight: 800; 
            padding: 1rem; 
            border-radius: 1rem; 
            text-transform: uppercase; 
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        .btn-rch:active { transform: scale(0.96); }

        .selo-nr1 {
            background: #065f46;
            color: white;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; }
            .report-box { border: 2px solid #000 !important; padding: 25px !important; margin-bottom: 40px !important; page-break-inside: avoid; }
            .signature-line { border-top: 2px solid #000; width: 250px; text-align: center; margin-top: 50px; font-weight: bold; font-size: 10px; }
        }

        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root">
        <!-- Loader inicial de segurança -->
        <div id="fallback-loader" style="height: 100vh; display: flex; align-items: center; justify-content: center; color: white; background: #0f172a; flex-direction: column;">
            <div style="width: 40px; height: 40px; border: 4px solid #2563eb; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;"></div>
            <h2 style="font-family: sans-serif; font-weight: 900; text-transform: uppercase; letter-spacing: 2px;">RCH AUDITORIA</h2>
            <p style="font-size: 10px; opacity: 0.5; margin-top: 10px;">A iniciar sistema seguro...</p>
        </div>
    </div>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Ícones SVG Inline (Sem dependências externas para evitar erro de tela escura)
        const Icons = {
            Shield: ({size=24, color="currentColor"}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            ),
            Folder: ({size=20, color="currentColor"}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            ),
            Printer: ({size=20}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            ),
            Search: ({size=18}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            ),
            Trash: ({size=18}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
            )
        };

        const firebaseConfig = {
            authDomain: "respeito-capital-humano-df.firebaseapp.com",
            projectId: "respeito-capital-humano-df",
            storageBucket: "respeito-capital-humano-df.firebasestorage.app",
            messagingSenderId: "1062425708099",
            appId: "1:1062425708099:web:260cfa86f5112a5b3cf6f6"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
        const DATA_PATH = 'artifacts/respeito-capital-humano-df/public/data';

        const App = () => {
            const [view, setView] = useState('welcome');
            const [companies, setCompanies] = useState([]);
            const [reports, setReports] = useState([]);
            const [folders, setFolders] = useState([]);
            const [search, setSearch] = useState('');
            const [activeCompany, setActiveCompany] = useState(null);
            const [adminPass, setAdminPass] = useState('');
            const [loading, setLoading] = useState(false);
            const [adminTab, setAdminTab] = useState('reports');
            const [lastProtocol, setLastProtocol] = useState('');
            const [qrModal, setQrModal] = useState(null);
            const [isIdentified, setIsIdentified] = useState(false);
            const [expandedEmp, setExpandedEmp] = useState(null);

            useEffect(() => {
                firebase.auth().signInAnonymously().then(() => {
                    db.collection(`${DATA_PATH}/companies`).onSnapshot(s => setCompanies(s.docs.map(d => ({id: d.id, ...d.data()}))));
                    db.collection(`${DATA_PATH}/reports`).onSnapshot(s => setReports(s.docs.map(d => ({id: d.id, ...d.data()}))));
                    db.collection(`${DATA_PATH}/folders`).onSnapshot(s => setFolders(s.docs.map(d => ({id: d.id, ...d.data()}))));
                });
            }, []);

            const results = useMemo(() => {
                const t = search.toLowerCase().trim();
                return t.length >= 2 ? companies.filter(c => c.name.toLowerCase().includes(t)) : [];
            }, [search, companies]);

            const submitRelato = async (e) => {
                e.preventDefault();
                setLoading(true);
                const fd = new FormData(e.target);
                const prot = 'RCH-' + Math.random().toString(36).substring(2, 7).toUpperCase();
                try {
                    await db.collection(`${DATA_PATH}/reports`).add({
                        protocolo: prot,
                        empresaName: activeCompany.name,
                        empresaId: activeCompany.id,
                        unidade: fd.get('unidade'),
                        dataOcorrencia: fd.get('dataOcorrencia'),
                        identidade: isIdentified ? 'IDENTIFICADO' : 'ANÓNIMO',
                        nomeRelator: fd.get('nomeRelator') || 'CONFIDENCIAL',
                        relato: fd.get('relato'),
                        contato: fd.get('contato') || 'NENHUM',
                        status: 'ABERTO',
                        dataProtocolo: new Date().toISOString()
                    });
                    setLastProtocol(prot);
                    setView('success');
                } catch (e) { alert("Falha na ligação."); }
                setLoading(false);
            };

            const updateField = async (id, data) => {
                await db.collection(`${DATA_PATH}/reports`).doc(id).update(data);
            };

            const showQR = (c) => {
                setQrModal(c);
                setTimeout(() => {
                    const el = document.getElementById("qr-box");
                    if (el) {
                        el.innerHTML = "";
                        new QRCode(el, { text: window.location.href, width: 200, height: 200 });
                    }
                }, 200);
            };

            // --- TELAS ---

            if (view === 'welcome') return (
                <div className="min-h-screen flex items-center justify-center p-6 animate-fade bg-slate-900">
                    <div className="max-w-xl w-full glass-card text-center relative">
                        <div className="flex justify-center gap-3 mb-8">
                            <div className="selo-nr1">NR-1 VALIDADA</div>
                            <div className="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-[9px] font-black uppercase shadow-lg">CERTIFICADO RCH</div>
                        </div>
                        <div className="text-blue-600 mb-6 flex justify-center"><Icons.Shield size={54}/></div>
                        <h1 className="text-2xl font-black uppercase italic tracking-tighter text-slate-900 mb-4 leading-none">Respeito ao Capital Humano</h1>
                        
                        <div className="bg-slate-50 p-6 rounded-2xl mb-10 border-l-4 border-emerald-600 text-left">
                            <p className="text-[10px] font-black uppercase text-emerald-600 mb-2 italic tracking-widest leading-none">Base Legal NR-1 (GRO):</p>
                            <p className="text-[11px] font-bold text-slate-500 leading-relaxed italic">
                                "O empregador deve estabelecer mecanismos para que os trabalhadores comuniquem situações de riscos e participem na gestão de SST."
                            </p>
                        </div>

                        <div className="text-left space-y-4">
                            <label className="text-[10px] font-black uppercase text-slate-400 ml-4 flex items-center gap-2"><Icons.Search size={14}/> Pesquisa de Empresa Cliente:</label>
                            <input type="text" placeholder="Digite o nome..." className="input-rch shadow-lg" value={search} onChange={e => setSearch(e.target.value)} />
                            <div className="space-y-3 pt-2">
                                {results.map(c => (
                                    <button key={c.id} onClick={() => { setActiveCompany(c); setView('form'); }} className="w-full bg-white border border-slate-100 p-5 rounded-3xl flex items-center justify-between hover:bg-blue-600 hover:text-white transition-all group shadow-sm">
                                        <div className="text-left"><span className="font-black uppercase text-sm">{c.name}</span><p className="text-[8px] font-black mt-1 opacity-50 uppercase leading-none group-hover:text-white">Canal Auditado NR-1</p></div>
                                        <span className="font-bold">➔</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                        <button onClick={() => setView('admin-login')} className="mt-14 text-[10px] font-black text-slate-300 uppercase italic">Acesso Auditoria Independente</button>
                    </div>
                </div>
            );

            if (view === 'form') return (
                <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
                    <div className="max-w-2xl w-full bg-white rounded-[3rem] shadow-2xl overflow-hidden text-left">
                        <header className="bg-slate-900 p-8 text-white flex justify-between items-center text-left leading-none">
                            <div className="text-left"><h2 className="text-xl font-black uppercase italic leading-none">{activeCompany.name}</h2><p className="text-[9px] text-blue-400 font-bold uppercase mt-2 tracking-widest italic">Protocolo Ético de SST</p></div>
                            <button onClick={() => setView('welcome')} className="text-white text-2xl font-bold">✕</button>
                        </header>
                        <form onSubmit={submitRelato} className="p-8 space-y-8">
                            <div className="grid grid-cols-2 gap-6">
                                <div><label className="text-[10px] font-black text-slate-400 block mb-2 italic ml-2">Unidade *</label><input name="unidade" required className="input-rch" /></div>
                                <div><label className="text-[10px] font-black text-slate-400 block mb-2 italic ml-2">Data do Fato *</label><input type="date" name="dataOcorrencia" required className="input-rch" /></div>
                            </div>
                            <div className="bg-slate-50 p-6 rounded-3xl space-y-4">
                                <p className="text-[10px] font-black text-slate-400 uppercase italic ml-2">Identificação</p>
                                <div className="flex gap-4">
                                    <button type="button" onClick={() => setIsIdentified(false)} className={`flex-1 py-4 rounded-xl font-black text-[10px] ${!isIdentified ? 'bg-blue-600 text-white shadow-lg' : 'bg-white text-slate-400'}`}>Anónimo</button>
                                    <button type="button" onClick={() => setIsIdentified(true)} className={`flex-1 py-4 rounded-xl font-black text-[10px] ${isIdentified ? 'bg-blue-600 text-white shadow-lg' : 'bg-white text-slate-400'}`}>Identificado</button>
                                </div>
                                {isIdentified && <input name="nomeRelator" required className="input-rch bg-white" placeholder="Seu Nome Completo" />}
                            </div>
                            <textarea name="relato" required className="input-rch h-48 normal-case font-medium text-sm leading-relaxed" placeholder="Descreva os fatos detalhadamente..."></textarea>
                            <button type="submit" disabled={loading} className="btn-rch py-5 text-lg shadow-2xl shadow-blue-500/30">{loading ? "Processando..." : "Protocolar Denúncia"}</button>
                        </form>
                    </div>
                </div>
            );

            if (view === 'success') return (
                <div className="h-screen flex flex-col items-center justify-center text-center p-10 bg-slate-900 text-white">
                    <h2 className="text-5xl font-black uppercase mb-4 leading-none italic">Protocolado</h2>
                    <div className="bg-white p-10 rounded-[3rem] mb-12 shadow-2xl scale-110">
                        <p className="text-[10px] font-black text-slate-400 mb-3 uppercase tracking-widest leading-none">Protocolo RCH Digital</p>
                        <p className="text-5xl font-black text-blue-600 tracking-tighter leading-none">{lastProtocol}</p>
                    </div>
                    <button onClick={() => window.location.reload()} className="btn-rch max-w-xs py-5 text-lg">Finalizar</button>
                </div>
            );

            if (view === 'admin-login') return (
                <div className="h-screen flex items-center justify-center p-6 bg-slate-900 text-center">
                    <div className="max-w-xs w-full glass-card">
                        <h2 className="text-xl font-black uppercase italic mb-8">Painel Auditora</h2>
                        <input type="password" className="input-rch text-center text-4xl mb-10 tracking-[0.4em] font-black" placeholder="••••" value={adminPass} onChange={e => setAdminPass(e.target.value)} />
                        <button onClick={() => adminPass === 'df2026' ? setView('admin-dash') : alert("Palavra-passe errada")} className="btn-rch py-4">Aceder</button>
                        <button onClick={() => setView('welcome')} className="mt-10 text-[9px] font-black text-slate-400 uppercase italic">Voltar</button>
                    </div>
                </div>
            );

            if (view === 'admin-dash') return (
                <div className="min-h-screen bg-slate-50 text-slate-900 p-6 text-left">
                    <header className="max-w-7xl mx-auto flex justify-between items-center mb-10 no-print text-left leading-none">
                        <div className="text-left flex items-center gap-4">
                            <div className="bg-slate-900 p-3 rounded-2xl text-white"><Icons.Shield size={24}/></div>
                            <div className="text-left leading-none">
                                <h2 className="text-xl font-black uppercase leading-none">Auditoria RCH 360</h2>
                                <p className="text-[10px] text-blue-600 font-bold uppercase mt-1 tracking-widest">Consola Daiana Freitas</p>
                            </div>
                        </div>
                        <div className="flex flex-wrap justify-end gap-2">
                             <button onClick={() => setAdminTab('reports')} className={`px-5 py-2 rounded-xl font-black text-[9px] uppercase ${adminTab === 'reports' ? 'bg-blue-600 text-white' : 'bg-white shadow-sm'}`}>Relatos</button>
                             <button onClick={() => setAdminTab('companies')} className={`px-5 py-2 rounded-xl font-black text-[9px] uppercase ${adminTab === 'companies' ? 'bg-blue-600 text-white' : 'bg-white shadow-sm'}`}>Empresas</button>
                             <button onClick={() => setView('welcome')} className="bg-red-50 text-red-600 px-5 py-2 rounded-xl font-black text-[9px] uppercase italic">Sair</button>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto">
                        {adminTab === 'companies' && (
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-sm text-left no-print border border-slate-200">
                                <h3 className="text-[10px] font-black uppercase text-slate-400 mb-8">Ativar Canal Cliente</h3>
                                <form onSubmit={async (e) => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
