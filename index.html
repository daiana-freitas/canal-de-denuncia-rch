<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canal de Ética | Respeito ao Capital Humano</title>
    
    <!-- Bibliotecas Necessárias -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase (Versão Simples) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: white; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.98); color: #0f172a; border-radius: 2rem; padding: 2.5rem; }
        .input-box { width: 100%; padding: 1.25rem; background-color: #f1f5f9; border-radius: 1rem; border: 2px solid transparent; font-weight: 700; color: #0f172a; text-transform: uppercase; outline: none; }
        .input-box:focus { border-color: #2563eb; }
        .btn-blue { width: 100%; background-color: #2563eb; color: white; font-weight: 800; padding: 1.25rem; border-radius: 1rem; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.2s; }
        .btn-blue:active { transform: scale(0.95); }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { Shield, Search, ChevronRight, CheckCircle, X, Trash2, Lock, ShieldCheck } = lucide;

        // Configuração Oficial Daiana
        const firebaseConfig = {
            authDomain: "respeito-capital-humano-df.firebaseapp.com",
            projectId: "respeito-capital-humano-df",
            storageBucket: "respeito-capital-humano-df.firebasestorage.app",
            messagingSenderId: "1062425708099",
            appId: "1:1062425708099:web:260cfa86f5112a5b3cf6f6"
        };

        // Iniciar Sistema
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const App = () => {
            const [view, setView] = useState('loading');
            const [companies, setCompanies] = useState([]);
            const [reports, setReports] = useState([]);
            const [search, setSearch] = useState('');
            const [activeCompany, setActiveCompany] = useState(null);
            const [adminPass, setAdminPass] = useState('');
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                auth.signInAnonymously().then(() => {
                    setView('welcome');
                    // Monitorizar Clientes e Relatos
                    db.collection('artifacts/respeito-capital-humano-df/public/data/companies')
                      .onSnapshot(snap => setCompanies(snap.docs.map(d => ({id: d.id, ...d.data()}))));
                    db.collection('artifacts/respeito-capital-humano-df/public/data/reports')
                      .onSnapshot(snap => setReports(snap.docs.map(d => ({id: d.id, ...d.data()}))));
                }).catch(() => setView('error'));
            }, []);

            const sendReport = async (e) => {
                e.preventDefault();
                setLoading(true);
                const fd = new FormData(e.target);
                try {
                    await db.collection('artifacts/respeito-capital-humano-df/public/data/reports').add({
                        empresa: activeCompany.name,
                        unidade: fd.get('unidade'),
                        relato: fd.get('relato'),
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setView('success');
                } catch (e) { alert("Erro de ligação."); }
                setLoading(false);
            };

            if (view === 'loading') return (
                <div className="h-screen flex flex-col items-center justify-center p-10">
                    <Shield size={64} className="text-blue-500 animate-bounce mb-6" />
                    <p className="font-black uppercase tracking-[0.3em] text-[10px] opacity-40">A Sincronizar Auditoria...</p>
                </div>
            );

            if (view === 'welcome') return (
                <div className="min-h-screen flex items-center justify-center p-6 animate-fade">
                    <div className="max-w-md w-full glass text-center shadow-2xl border border-white/10">
                        <div className="bg-blue-600 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-6 text-white shadow-lg">
                            <Shield size={40} />
                        </div>
                        <h1 className="text-2xl font-black uppercase italic tracking-tighter text-slate-900 leading-none">Respeito ao Capital Humano</h1>
                        <p className="text-blue-600 text-[10px] font-black uppercase tracking-widest mt-3 mb-10">Consultoria Estratégica</p>
                        
                        <div className="text-left space-y-4">
                            <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-4 italic">Selecione a sua empresa:</label>
                            <div className="relative">
                                <Search className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-300" size={20} />
                                <input type="text" placeholder="Nome..." className="input-box pl-14 shadow-inner" value={search} onChange={e => setSearch(e.target.value)} />
                            </div>
                            {search && (
                                <div className="bg-white border rounded-2xl shadow-xl p-2 max-h-48 overflow-y-auto">
                                    {companies.filter(c => c.name.toLowerCase().includes(search.toLowerCase())).map(c => (
                                        <button key={c.id} onClick={() => { setActiveCompany(c); setView('form'); }} className="w-full flex items-center justify-between p-4 rounded-xl hover:bg-blue-600 hover:text-white transition-all text-slate-900 font-bold uppercase text-xs">
                                            {c.name} <ChevronRight size={16} />
                                        </button>
                                    ))}
                                </div>
                            )}
                        </div>
                        
                        <div className="mt-10 flex justify-center gap-3 opacity-50">
                            <ShieldCheck size={18} className="text-blue-600" />
                            <span className="text-[9px] font-black uppercase tracking-widest">Canal 100% Anónimo e Seguro</span>
                        </div>

                        <button onClick={() => setView('admin-login')} className="mt-12 text-[9px] font-black text-slate-300 uppercase tracking-widest hover:text-blue-600 transition-all italic">Gestão da Auditoria DF</button>
                    </div>
                </div>
            );

            if (view === 'form') return (
                <div className="min-h-screen bg-slate-100 flex items-center justify-center p-6">
                    <div className="max-w-xl w-full bg-white rounded-[3rem] shadow-2xl overflow-hidden text-slate-900 animate-fade">
                        <div className="bg-slate-900 p-8 text-white flex justify-between items-center">
                            <div className="text-left leading-none">
                                <h2 className="text-lg font-black uppercase italic tracking-tighter leading-none">{activeCompany.name}</h2>
                                <p className="text-[9px] font-bold text-blue-400 uppercase mt-2">Protocolo Seguro RCH</p>
                            </div>
                            <button onClick={() => setView('welcome')} className="p-2 bg-white/10 rounded-xl"><X /></button>
                        </div>
                        <form onSubmit={sendReport} className="p-8 space-y-8 text-left leading-none">
                            <div className="space-y-2">
                                <label className="text-[10px] font-black uppercase text-slate-400 ml-1">Unidade / Local *</label>
                                <input name="unidade" required className="input-box" placeholder="Ex: Matriz / Filial" />
                            </div>
                            <div className="space-y-2">
                                <label className="text-[10px] font-black uppercase text-slate-400 ml-1">Relato Detalhado *</label>
                                <textarea name="relato" required className="input-box h-48 py-4 font-medium normal-case" placeholder="Descreva os acontecimentos com o máximo de detalhes..."></textarea>
                            </div>
                            <button type="submit" disabled={loading} className="btn-blue shadow-xl">
                                {loading ? "A ENVIAR..." : "PROTOCOLAR AGORA"}
                            </button>
                        </form>
                    </div>
                </div>
            );

            if (view === 'success') return (
                <div className="h-screen flex flex-col items-center justify-center text-center p-10 animate-fade">
                    <CheckCircle size={100} className="text-blue-500 mb-8 animate-bounce" />
                    <h2 className="text-5xl font-black uppercase italic mb-4 text-white">Recebido</h2>
                    <p className="text-xs font-bold text-white opacity-40 mb-12 uppercase tracking-widest leading-relaxed">O seu relato foi guardado com sucesso pela Auditoria RCH.</p>
                    <button onClick={() => window.location.reload()} className="btn-blue max-w-xs shadow-2xl">Concluir</button>
                </div>
            );

            if (view === 'admin-login') return (
                <div className="h-screen flex items-center justify-center p-6">
                    <div className="max-w-xs w-full glass text-center shadow-2xl">
                        <Lock size={48} className="mx-auto mb-6 text-blue-600" />
                        <h2 className="text-xl font-black uppercase text-slate-900 mb-8 tracking-tighter">Painel Auditor</h2>
                        <input type="password" className="input-box text-center text-4xl mb-10 shadow-inner" placeholder="0000" value={adminPass} onChange={e => setAdminPass(e.target.value)} />
                        <button onClick={() => adminPass === 'df2026' ? setView('admin-dash') : alert("Incorreta")} className="btn-blue shadow-lg">Entrar</button>
                        <button onClick={() => setView('welcome')} className="mt-8 text-[9px] font-black uppercase text-slate-300 tracking-widest italic">Voltar ao Início</button>
                    </div>
                </div>
            );

            if (view === 'admin-dash') return (
                <div className="min-h-screen bg-slate-50 text-slate-900 p-6 text-left animate-fade">
                    <header className="max-w-6xl mx-auto flex justify-between items-center mb-10">
                        <div className="flex items-center gap-4">
                            <div className="bg-navy p-2 rounded-xl text-white shadow-lg"><Shield size={32} /></div>
                            <h2 className="text-2xl font-black uppercase italic tracking-tighter leading-none">Gestão Estratégica RCH</h2>
                        </div>
                        <button onClick={() => setView('welcome')} className="bg-red-50 text-red-600 px-8 py-3 rounded-2xl font-black text-[10px] uppercase shadow-sm">Sair</button>
                    </header>
                    <main className="max-w-6xl mx-auto space-y-12">
                        <div className="bg-white p-12 rounded-[3.5rem] shadow-xl flex flex-col md:flex-row gap-8 items-center border-t-[16px] border-blue-600">
                             <div className="flex-grow w-full text-left">
                                <label className="text-[10px] font-black uppercase text-slate-400 mb-3 block ml-4 italic leading-none tracking-widest">Ativar Novo Cliente</label>
                                <input id="nc" className="input-box text-2xl tracking-tighter shadow-inner" placeholder="Nome da Empresa" />
                             </div>
                             <button onClick={() => {
                                const val = document.getElementById('nc').value;
                                if(val) db.collection('artifacts/respeito-capital-humano-df/public/data/companies').add({name: val, createdAt: firebase.firestore.FieldValue.serverTimestamp()});
                                document.getElementById('nc').value = '';
                             }} className="w-full md:w-auto bg-blue-600 text-white px-20 py-8 rounded-[2.5rem] font-black uppercase text-xs shadow-2xl mt-6">Registar</button>
                        </div>
                        <div className="space-y-8">
                            <h3 className="text-xl font-black uppercase italic tracking-tighter border-b pb-4 ml-2">Protocolos Recebidos ({reports.length})</h3>
                            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {reports.sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)).map(r => (
                                    <div key={r.id} className="bg-white p-10 rounded-[3.5rem] shadow-sm border-l-[16px] border-blue-600 relative hover:shadow-2xl transition-all group">
                                        <button onClick={() => { if(confirm("Apagar permanentemente?")) db.collection('artifacts/respeito-capital-humano-df/public/data/reports').doc(r.id).delete() }} className="absolute top-6 right-6 text-red-100 hover:text-red-500 transition-colors"><Trash2 size={24}/></button>
                                        <h4 className="font-black uppercase text-2xl text-slate-900 mb-2 leading-none group-hover:text-blue-600 transition-colors">{r.empresa}</h4>
                                        <p className="text-[10px] font-black uppercase text-slate-400 mb-8 italic tracking-widest">{r.unidade || 'Local não especificado'}</p>
                                        <div className="bg-slate-50 p-6 rounded-[2rem] text-sm font-bold text-slate-700 italic border border-slate-100 shadow-inner leading-relaxed">"{r.relato}"</div>
                                        <div className="mt-8 pt-6 border-t flex justify-between items-center text-[9px] font-black uppercase text-slate-300 italic tracking-widest">
                                            <span>{r.createdAt ? new Date(r.createdAt.seconds * 1000).toLocaleDateString() : 'A ligar...'}</span>
                                            <span className="text-blue-600">Auditado RCH</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>
                </div>
            );

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
