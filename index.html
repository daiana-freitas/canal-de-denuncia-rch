<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enterprise RCH | Auditoria 360 & NR-1</title>
    
    <!-- Bibliotecas de Estabilidade (Links Diretos) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0f172a; 
            margin: 0;
            color: #1e293b;
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.98); 
            border-radius: 2.5rem; 
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }

        .input-rch { 
            width: 100%; 
            padding: 1.1rem; 
            background-color: #f1f5f9; 
            border-radius: 1rem; 
            border: 2px solid transparent; 
            font-weight: 700; 
            text-transform: uppercase; 
            outline: none; 
            color: #0f172a;
            transition: all 0.2s;
        }

        .input-rch:focus { border-color: #2563eb; background-color: white; }

        .btn-rch { 
            background-color: #2563eb; 
            color: white; 
            font-weight: 800; 
            padding: 1rem; 
            border-radius: 1rem; 
            text-transform: uppercase; 
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        .btn-rch:active { transform: scale(0.96); }

        .selo-nr1 {
            background: linear-gradient(135deg, #065f46, #059669);
            color: white;
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 9px;
            font-weight: 900;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; }
            .report-box { border: 2px solid #000 !important; padding: 25px !important; margin-bottom: 30px !important; page-break-inside: avoid; }
            .signature-line { border-top: 2px solid #000; width: 250px; text-align: center; margin-top: 50px; font-weight: bold; font-size: 10px; }
        }

        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { 
            Shield, Search, ChevronRight, CheckCircle, ShieldCheck, 
            X, Trash2, Lock, Building2, Printer, QrCode, 
            Calendar, GraduationCap, Gavel, UserCheck, UserX, FileText, Scale, FolderPlus, FolderOpen, ChevronDown, ChevronUp
        } = lucide;

        const firebaseConfig = {
            authDomain: "respeito-capital-humano-df.firebaseapp.com",
            projectId: "respeito-capital-humano-df",
            storageBucket: "respeito-capital-humano-df.firebasestorage.app",
            messagingSenderId: "1062425708099",
            appId: "1:1062425708099:web:260cfa86f5112a5b3cf6f6"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
        const DATA_PATH = 'artifacts/respeito-capital-humano-df/public/data';

        const App = () => {
            const [view, setView] = useState('welcome');
            const [companies, setCompanies] = useState([]);
            const [reports, setReports] = useState([]);
            const [folders, setFolders] = useState([]);
            const [search, setSearch] = useState('');
            const [activeCompany, setActiveCompany] = useState(null);
            const [adminPass, setAdminPass] = useState('');
            const [loading, setLoading] = useState(false);
            const [adminTab, setAdminTab] = useState('reports');
            const [lastProtocol, setLastProtocol] = useState('');
            const [qrTarget, setQrTarget] = useState(null);
            const [isIdentified, setIsIdentified] = useState(false);
            const [hasWitnesses, setHasWitnesses] = useState(false);
            const [expandedCompany, setExpandedCompany] = useState(null);

            useEffect(() => {
                firebase.auth().signInAnonymously().then(() => {
                    db.collection(`${DATA_PATH}/companies`).onSnapshot(s => setCompanies(s.docs.map(d => ({id: d.id, ...d.data()}))));
                    db.collection(`${DATA_PATH}/reports`).onSnapshot(s => setReports(s.docs.map(d => ({id: d.id, ...d.data()}))));
                    db.collection(`${DATA_PATH}/folders`).onSnapshot(s => setFolders(s.docs.map(d => ({id: d.id, ...d.data()}))));
                });
            }, []);

            const searchResults = useMemo(() => {
                const t = search.toLowerCase().trim();
                return t.length >= 2 ? companies.filter(c => c.name.toLowerCase().includes(t)) : [];
            }, [search, companies]);

            const submitRelato = async (e) => {
                e.preventDefault();
                setLoading(true);
                const fd = new FormData(e.target);
                const prot = 'RCH-' + Math.random().toString(36).substring(2, 7).toUpperCase();
                try {
                    await db.collection(`${DATA_PATH}/reports`).add({
                        protocolo: prot,
                        empresaName: activeCompany.name,
                        empresaId: activeCompany.id,
                        unidade: fd.get('unidade'),
                        dataOcorrencia: fd.get('dataOcorrencia'),
                        identidade: isIdentified ? 'IDENTIFICADO' : 'ANÓNIMO',
                        nomeRelator: fd.get('nomeRelator') || 'CONFIDENCIAL',
                        relato: fd.get('relato'),
                        testemunhas: hasWitnesses ? 'SIM' : 'NÃO',
                        nomesTestemunhas: fd.get('nomesTestemunhas') || 'NÃO INFORMADO',
                        contato: fd.get('contato') || 'NENHUM',
                        status: 'ABERTO',
                        folderId: 'default',
                        dataProtocolo: new Date().toISOString()
                    });
                    setLastProtocol(prot);
                    setView('success');
                } catch (e) { alert("Erro ao enviar."); }
                setLoading(false);
            };

            const updateData = async (id, data) => {
                await db.collection(`${DATA_PATH}/reports`).doc(id).update(data);
            };

            const showQR = (c) => {
                setQrTarget(c);
                setTimeout(() => {
                    const el = document.getElementById("qr-box");
                    if (el) {
                        el.innerHTML = "";
                        new QRCode(el, { text: window.location.href, width: 200, height: 200 });
                    }
                }, 100);
            };

            // --- TELAS ---
            
            if (view === 'welcome') return (
                <div className="min-h-screen flex items-center justify-center p-6 animate-fade">
                    <div className="max-w-2xl w-full glass-card text-center relative overflow-hidden">
                        <div className="flex justify-center gap-4 mb-8">
                            <div className="selo-nr1"><Scale size={16} /> NR-1 VALIDADA</div>
                            <div className="bg-blue-600 text-white px-4 py-2 rounded-xl text-[9px] font-black uppercase shadow-lg flex items-center gap-2"><ShieldCheck size={16} /> CERTIFICADO RCH</div>
                        </div>
                        <Shield size={48} className="mx-auto text-blue-600 mb-6" />
                        <h1 className="text-3xl font-black uppercase italic tracking-tighter text-slate-900 mb-4">Respeito ao Capital Humano</h1>
                        <div className="bg-slate-50 p-6 rounded-3xl mb-10 border-l-4 border-emerald-500 text-left">
                            <p className="text-[10px] font-black uppercase text-emerald-600 mb-2 italic tracking-widest leading-none">Citação Obrigatória NR-1:</p>
                            <p className="text-[11px] font-bold text-slate-500 leading-relaxed italic">
                                "O empregador deve estabelecer mecanismos para que os trabalhadores comuniquem situações de riscos graves e participem da gestão de SST."
                            </p>
                        </div>
                        <div className="text-left space-y-4">
                            <label className="text-[10px] font-black uppercase text-slate-400 ml-4">Pesquisa Identificada da Empresa Cliente:</label>
                            <input type="text" placeholder="Digite o nome da empresa..." className="input-rch shadow-lg border-slate-100" value={search} onChange={e => setSearch(e.target.value)} />
                            <div className="space-y-3">
                                {searchResults.map(c => (
                                    <button key={c.id} onClick={() => { setActiveCompany(c); setView('form'); }} className="w-full bg-white border border-slate-100 p-5 rounded-3xl flex items-center justify-between hover:bg-blue-600 hover:text-white transition-all group">
                                        <div className="flex flex-col text-left"><span className="font-black uppercase text-sm">{c.name}</span><span className="text-[8px] font-black mt-1 opacity-50">CANAL AUDITADO RCH</span></div>
                                        <ChevronRight size={22} className="text-blue-600 group-hover:text-white" />
                                    </button>
                                ))}
                            </div>
                        </div>
                        <button onClick={() => setView('admin-login')} className="mt-14 text-[10px] font-black text-slate-300 uppercase italic">Acesso Auditoria</button>
                    </div>
                </div>
            );

            if (view === 'form') return (
                <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
                    <div className="max-w-2xl w-full bg-white rounded-[3rem] shadow-2xl overflow-hidden text-slate-900 text-left">
                        <header className="bg-slate-900 p-8 text-white flex justify-between items-center">
                            <div className="text-left"><h2 className="text-xl font-black uppercase italic tracking-tight">{activeCompany.name}</h2><p className="text-[9px] font-bold text-blue-400 uppercase mt-2 tracking-widest italic leading-none">Protocolo Ético de SST</p></div>
                            <button onClick={() => setView('welcome')} className="text-white bg-white/10 p-2 rounded-xl"><X size={24}/></button>
                        </header>
                        <form onSubmit={submitRelato} className="p-8 space-y-8">
                            <div className="grid grid-cols-2 gap-6">
                                <div><label className="text-[10px] font-black text-slate-400 block mb-2 ml-2 italic">Unidade *</label><input name="unidade" required className="input-rch" placeholder="Ex: Sede" /></div>
                                <div><label className="text-[10px] font-black text-slate-400 block mb-2 ml-2 italic">Data do Fato *</label><input type="date" name="dataOcorrencia" required className="input-rch" /></div>
                            </div>
                            <div className="bg-slate-50 p-6 rounded-3xl space-y-4">
                                <p className="text-[10px] font-black text-slate-400 italic">Identificação</p>
                                <div className="flex gap-4">
                                    <button type="button" onClick={() => setIsIdentified(false)} className={`flex-1 p-4 rounded-xl font-black text-[10px] ${!isIdentified ? 'bg-blue-600 text-white shadow-lg' : 'bg-white'}`}>Anónimo</button>
                                    <button type="button" onClick={() => setIsIdentified(true)} className={`flex-1 p-4 rounded-xl font-black text-[10px] ${isIdentified ? 'bg-blue-600 text-white shadow-lg' : 'bg-white'}`}>Identificado</button>
                                </div>
                                {isIdentified && <input name="nomeRelator" required className="input-rch bg-white" placeholder="Seu Nome" />}
                            </div>
                            <textarea name="relato" required className="input-rch h-48 normal-case font-medium text-sm" placeholder="O Seu Relato..."></textarea>
                            <div className="bg-slate-50 p-6 rounded-3xl space-y-4">
                                <p className="text-[10px] font-black text-slate-400 italic">Testemunhas?</p>
                                <div className="flex gap-4">
                                    <button type="button" onClick={() => setHasWitnesses(true)} className={`flex-1 p-4 rounded-xl font-black text-[10px] ${hasWitnesses ? 'bg-blue-600 text-white shadow-lg' : 'bg-white'}`}>Sim</button>
                                    <button type="button" onClick={() => setHasWitnesses(false)} className={`flex-1 p-4 rounded-xl font-black text-[10px] ${!hasWitnesses ? 'bg-blue-600 text-white shadow-lg' : 'bg-white'}`}>Não</button>
                                </div>
                                {hasWitnesses && <textarea name="nomesTestemunhas" className="input-rch bg-white h-24 normal-case text-xs" placeholder="Liste nomes..."></textarea>}
                            </div>
                            <div className="bg-emerald-50 p-6 rounded-3xl flex items-start gap-4 text-emerald-600">
                                <ShieldCheck size={24} /> <p className="text-[9px] font-medium leading-relaxed italic">Este canal é gerido de forma independente pela Auditoria RCH. O sigilo é garantido por lei e pela NR-1.</p>
                            </div>
                            <button type="submit" disabled={loading} className="btn-rch py-5 text-lg shadow-2xl">{loading ? "Enviando..." : "Protocolar Agora"}</button>
                        </form>
                    </div>
                </div>
            );

            if (view === 'success') return (
                <div className="h-screen flex flex-col items-center justify-center text-center p-10 bg-slate-900">
                    <CheckCircle size={100} className="text-blue-500 animate-bounce mb-8" />
                    <h2 className="text-4xl font-black uppercase italic text-white mb-4 leading-none">Recebido</h2>
                    <div className="bg-white p-10 rounded-[3rem] mb-14 shadow-2xl scale-110">
                        <p className="text-[10px] font-black text-slate-400 mb-3 uppercase tracking-widest leading-none">Protocolo Digital</p>
                        <p className="text-5xl font-black text-blue-600 tracking-tighter leading-none">{lastProtocol}</p>
                    </div>
                    <button onClick={() => window.location.reload()} className="btn-rch max-w-xs py-5">Finalizar</button>
                </div>
            );

            if (view === 'admin-login') return (
                <div className="h-screen flex items-center justify-center p-6 text-center animate-fade">
                    <div className="max-w-xs w-full glass-card">
                        <Lock size={40} className="mx-auto text-blue-600 mb-8" />
                        <h2 className="text-xl font-black uppercase text-slate-900 mb-8 leading-none">Painel Auditora</h2>
                        <input type="password" className="input-rch text-center text-4xl mb-10 tracking-[0.4em] font-black" placeholder="••••" value={adminPass} onChange={e => setAdminPass(e.target.value)} />
                        <button onClick={() => adminPass === 'df2026' ? setView('admin-dash') : alert("Incorreta")} className="btn-rch py-4">Entrar</button>
                        <button onClick={() => setView('welcome')} className="mt-8 text-[9px] font-black text-slate-300 uppercase italic">Voltar</button>
                    </div>
                </div>
            );

            if (view === 'admin-dash') return (
                <div className="min-h-screen bg-slate-50 text-slate-900 p-6 md:p-12 text-left">
                    <header className="flex flex-col md:flex-row justify-between items-center mb-10 max-w-7xl mx-auto gap-4 no-print text-left">
                        <div className="flex items-center gap-4 text-left leading-none">
                            <div className="bg-slate-900 p-4 rounded-3xl text-white shadow-xl"><Shield size={32} /></div>
                            <div className="text-left leading-none"><h2 className="text-2xl font-black uppercase italic leading-none text-left">Enterprise 360</h2><p className="text-[10px] font-bold text-blue-600 uppercase mt-2 tracking-widest italic leading-none text-left">Gestão Independente | Daiana Freitas</p></div>
                        </div>
                        <div className="flex flex-wrap justify-center gap-3">
                             <button onClick={() => setAdminTab('reports')} className={`px-6 py-3 rounded-2xl font-black text-[10px] uppercase transition-all ${adminTab === 'reports' ? 'bg-blue-600 text-white shadow-lg' : 'bg-white text-slate-400'}`}>Relatos</button>
                             <button onClick={() => setAdminTab('folders')} className={`px-6 py-3 rounded-2xl font-black text-[10px] uppercase transition-all ${adminTab === 'folders' ? 'bg-blue-600 text-white shadow-lg' : 'bg-white text-slate-400'}`}>Pastas</button>
                             <button onClick={() => setAdminTab('companies')} className={`px-6 py-3 rounded-2xl font-black text-[10px] uppercase transition-all ${adminTab === 'companies' ? 'bg-blue-600 text-white shadow-lg' : 'bg-white text-slate-400'}`}>Empresas</button>
                             <button onClick={() => setView('welcome')} className="bg-red-50 text-red-600 font-black text-[10px] px-6 py-3 rounded-2xl border border-red-100 uppercase italic">Sair</button>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto">
                        {adminTab === 'folders' && (
                            <div className="space-y-12 animate-fade no-print text-left">
                                <div className="bg-white p-10 rounded-[3rem] shadow-xl border-t-8 border-emerald-600 text-left">
                                    <h3 className="text-[10px] font-black uppercase italic text-slate-400 mb-8 tracking-widest text-left">Criar Pasta Personalizada</h3>
