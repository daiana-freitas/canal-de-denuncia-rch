<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canal RCH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .card { background: white; color: black; padding: 20px; border-radius: 15px; margin: 10px; }
        .btn { background: #2563eb; color: white; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-md mx-auto text-center">
        <h1 class="text-2xl font-bold mb-4">RESPEITO AO CAPITAL HUMANO</h1>
        <p class="text-blue-400 text-xs mb-8">Auditoria Independente</p>

        <div class="bg-blue-900/30 p-4 rounded-xl border border-blue-500 mb-8">
            <p class="text-[10px] mb-2">ÁREA DA DAIANA:</p>
            <button onclick="window.location.hash = '#admin'" class="bg-white text-blue-900 px-4 py-2 rounded font-bold text-xs">ABRIR PAINEL DE GESTÃO</button>
        </div>

        <input type="text" id="busca" placeholder="Pesquisar Empresa..." class="w-full p-4 rounded-xl text-black mb-4">
        <div id="lista"></div>
    </div>

    <script>
        const firebaseConfig = {
            authDomain: "respeito-capital-humano-df.firebaseapp.com",
            projectId: "respeito-capital-humano-df",
            storageBucket: "respeito-capital-humano-df.firebasestorage.app",
            messagingSenderId: "1062425708099",
            appId: "1:1062425708099:web:260cfa86f5112a5b3cf6f6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Lógica simples para mudar de tela
        window.onhashchange = () => location.reload();

        if(window.location.hash === '#admin') {
            const pass = prompt("Senha da Auditora:");
            if(pass === 'df2026') {
                document.body.innerHTML = `
                    <div class="p-4">
                        <button onclick="location.hash=''" class="mb-4">← Voltar</button>
                        <h2 class="text-xl font-bold mb-4">PAINEL RCH</h2>
                        <input id="new" placeholder="Nome da Empresa" class="p-4 text-black w-full rounded mb-2">
                        <button onclick="db.collection('artifacts/respeito-capital-humano-df/public/data/companies').add({name: document.getElementById('new').value.toUpperCase()}); alert('Registada!');" class="btn">REGISTAR</button>
                        <hr class="my-6 opacity-20">
                        <div id="relatos"></div>
                    </div>
                `;
                db.collection('artifacts/respeito-capital-humano-df/public/data/reports').onSnapshot(s => {
                    document.getElementById('relatos').innerHTML = s.docs.map(d => `<div class="card"><b>${d.data().empresa}</b><p>${d.data().relato}</p></div>`).join('');
                });
            } else { location.hash = ''; }
        }
    </script>
</body>
</html>
