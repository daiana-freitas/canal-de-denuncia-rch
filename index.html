<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Canal de Ética | RCH</title>
    
    <!-- Bibliotecas Core -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; margin: 0; color: #1e293b; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.98); border-radius: 2.5rem; padding: 2rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-rch { width: 100%; padding: 1.25rem; background: #f1f5f9; border-radius: 1.25rem; border: 2px solid transparent; font-weight: 700; color: #0f172a; text-transform: uppercase; outline: none; font-size: 16px; }
        .input-rch:focus { border-color: #2563eb; background: white; }
        .btn-rch { width: 100%; background: #2563eb; color: white; font-weight: 800; padding: 1.25rem; border-radius: 1.25rem; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; border: none; }
        .btn-rch:active { transform: scale(0.96); opacity: 0.9; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { Shield, Search, ChevronRight, CheckCircle, ShieldCheck, X, Trash2, Lock, Building2 } = lucide;

        const firebaseConfig = {
            authDomain: "respeito-capital-humano-df.firebaseapp.com",
            projectId: "respeito-capital-humano-df",
            storageBucket: "respeito-capital-humano-df.firebasestorage.app",
            messagingSenderId: "1062425708099",
            appId: "1:1062425708099:web:260cfa86f5112a5b3cf6f6"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
        const auth = firebase.auth();
        const PATH = 'artifacts/respeito-capital-humano-df/public/data';

        const App = () => {
            const [view, setView] = useState('loading');
            const [companies, setCompanies] = useState([]);
            const [reports, setReports] = useState([]);
            const [search, setSearch] = useState('');
            const [activeCompany, setActiveCompany] = useState(null);
            const [adminPass, setAdminPass] = useState('');
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                auth.signInAnonymously().then(() => {
                    db.collection(`${PATH}/companies`).onSnapshot(snap => {
                        setCompanies(snap.docs.map(d => ({id: d.id, ...d.data()})));
                        setView('welcome');
                    }, () => setView('welcome'));
                    db.collection(`${PATH}/reports`).onSnapshot(snap => {
                        setReports(snap.docs.map(d => ({id: d.id, ...d.data()})));
                    });
                }).catch(() => setView('welcome'));
            }, []);

            const filtered = useMemo(() => {
                const t = search.toLowerCase().trim();
                return t ? companies.filter(c => c.name.toLowerCase().includes(t)) : [];
            }, [search, companies]);

            const handleReport = async (e) => {
                e.preventDefault();
                setLoading(true);
                const fd = new FormData(e.target);
                try {
                    await db.collection(`${PATH}/reports`).add({
                        empresa: activeCompany.name,
                        unidade: fd.get('unidade'),
                        relato: fd.get('relato'),
                        contato: fd.get('contato') || 'Anónimo',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setView('success');
                } catch (e) { alert("Erro de conexão."); }
                setLoading(false);
            };

            if (view === 'loading') return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-white">
                    <Shield size={64} className="text-blue-500 animate-bounce mb-6" />
                    <p className="font-black uppercase tracking-[0.4em] text-[10px] opacity-50 italic text-center">Iniciando Servidor RCH...</p>
                </div>
            );

            if (view === 'welcome') return (
                <div className="min-h-screen flex items-center justify-center p-6 text-center">
                    <div className="max-w-xl w-full glass">
                        <div className="bg-blue-600 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-6 text-white shadow-xl leading-none">
                            <Shield size={40} />
                        </div>
                        <h1 className="text-2xl font-black uppercase italic tracking-tighter leading-none text-slate-900">Respeito ao Capital Humano</h1>
                        <p className="text-blue-600 text-[10px] font-black uppercase tracking-widest mt-2 mb-10 leading-none">Consultoria Independente</p>
                        
                        <div className="text-left space-y-4 leading-none">
                            <label className="text-[10px] font-black uppercase text-slate-400 italic ml-4 leading-none tracking-widest text-left">Escolha a empresa:</label>
                            <input type="text" placeholder="Nome da empresa..." className="input-rch shadow-sm" value={search} onChange={e => setSearch(e.target.value)} />
                            {search && (
                                <div className="bg-white border rounded-2xl shadow-xl p-2 max-h-48 overflow-y-auto mt-2 leading-none">
                                    {filtered.length > 0 ? filtered.map(c => (
                                        <button key={c.id} onClick={() => { setActiveCompany(c); setView('form'); }} className="w-full flex items-center justify-between p-5 rounded-2xl hover:bg-blue-600 hover:text-white transition-all text-left font-bold uppercase text-sm group leading-none">
                                            {c.name} <ChevronRight size={18} />
                                        </button>
                                    )) : <div className="p-8 text-center text-slate-400 font-bold italic text-xs uppercase leading-none">Não encontrada</div>}
                                </div>
                            )}
                        </div>
                        <div className="mt-12 pt-6 border-t flex justify-center items-center gap-3 leading-none">
                            <ShieldCheck size={20} className="text-blue-600" />
                            <span className="text-[9px] font-black uppercase text-slate-400 tracking-widest leading-none">Canal Seguro RCH</span>
                        </div>
                        <button onClick={() => setView('admin-login')} className="mt-10 text-[9px] font-black text-slate-300 uppercase tracking-widest hover:text-blue-600 italic leading-none">Acesso Auditoria</button>
                    </div>
                </div>
            );

            if (view === 'form') return (
                <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4 md:p-10 text-left">
                    <div className="max-w-xl w-full bg-white rounded-[3rem] shadow-2xl overflow-hidden text-slate-900 border border-slate-200">
                        <header className="bg-slate-900 p-8 text-white flex justify-between items-center leading-none">
                            <div className="text-left leading-none">
                                <h2 className="text-lg font-black uppercase leading-none italic">{activeCompany.name}</h2>
                                <p className="text-[9px] font-bold text-blue-400 uppercase mt-2 leading-none">Relato Blindado</p>
                            </div>
                            <button onClick={() => setView('welcome')} className="text-white opacity-50 hover:opacity-100 leading-none"><X size={24}/></button>
                        </header>
                        <form onSubmit={handleReport} className="p-8 space-y-8 text-left leading-none">
                            <input name="unidade" required className="input-rch" placeholder="Unidade / Local *" />
                            <textarea name="relato" required className="input-rch h-56 normal-case font-medium text-sm" placeholder="Descreva os factos com detalhes..."></textarea>
                            <input name="contato" className="input-rch border-blue-50 bg-blue-50/20" placeholder="Contacto (Opcional)" />
                            <button type="submit" disabled={loading} className="btn-rch leading-none">{loading ? "Enviando..." : "Protocolar"}</button>
                        </form>
                    </div>
                </div>
            );

            if (view === 'success') return (
                <div className="h-screen flex flex-col items-center justify-center text-center p-10 bg-slate-900 text-white">
                    <CheckCircle size={80} className="text-blue-500 mb-6 animate-bounce" />
                    <h2 className="text-4xl font-black uppercase italic mb-4">Enviado</h2>
                    <p className="text-sm opacity-50 mb-10 font-bold uppercase tracking-widest text-center">Protocolo guardado pela RCH.</p>
                    <button onClick={() => window.location.reload()} className="btn-rch max-w-xs">Sair</button>
                </div>
            );

            if (view === 'admin-login') return (
                <div className="h-screen flex items-center justify-center p-6 text-center">
                    <div className="max-w-xs w-full glass text-center border border-white/20">
                        <Lock size={40} className="mx-auto mb-6 text-blue-600 leading-none" />
                        <h2 className="text-xl font-black uppercase text-slate-900 mb-10 leading-none">Painel Auditor</h2>
                        <input type="password" className="input-rch text-center text-4xl mb-10" placeholder="••••" value={adminPass} onChange={e => setAdminPass(e.target.value)} />
                        <button onClick={() => adminPass === 'df2026' ? setView('admin-dash') : alert("Incorreta")} className="btn-rch">Entrar</button>
                        <button onClick={() => setView('welcome')} className="mt-8 text-[9px] font-black text-slate-400 uppercase tracking-widest">Voltar</button>
                    </div>
                </div>
            );

            if (view === 'admin-dash') return (
                <div className="min-h-screen bg-slate-50 text-slate-900 p-6 md:p-12 text-left">
                    <header className="flex justify-between items-center mb-10 max-w-5xl mx-auto text-left leading-none">
                        <div className="flex items-center gap-3 text-left leading-none">
                            <Shield size={28} className="text-blue-600" />
                            <h2 className="text-xl font-black uppercase italic leading-none">Gestão RCH</h2>
                        </div>
                        <button onClick={() => setView('welcome')} className="text-red-600 font-black text-[10px] uppercase italic leading-none">Sair</button>
                    </header>
                    <div className="max-w-5xl mx-auto space-y-12">
                        <div className="bg-white p-10 rounded-[3rem] shadow-xl border-t-8 border-blue-600 text-left">
                            <h3 className="text-[10px] font-black uppercase italic text-slate-400 mb-6 tracking-widest text-left">Ativar Nova Empresa</h3>
                            <div className="flex flex-col md:flex-row gap-6">
                                <input id="nc" className="flex-grow p-4 bg-slate-50 rounded-xl font-bold uppercase outline-none focus:border-blue-600 border-2 border-transparent shadow-inner" placeholder="Nome" />
                                <button onClick={() => { const v = document.getElementById('nc').value; if(v) db.collection(`${PATH}/companies`).add({name: v.toUpperCase()}); document.getElementById('nc').value = ''; }} className="bg-blue-600 text-white px-10 py-4 rounded-xl font-black uppercase text-xs">Ativar</button>
                            </div>
                        </div>
                        <div className="grid md:grid-cols-2 gap-8">
                            {reports.sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)).map(r => (
                                <div key={r.id} className="bg-white p-8 rounded-[3rem] shadow-md border-l-[16px] border-l-blue-600 text-left relative group">
                                    <button onClick={() => { if(confirm("Apagar?")) db.collection(`${PATH}/reports`).doc(r.id).delete(); }} className="absolute top-6 right-6 text-red-100 group-hover:text-red-500"><Trash2 size={24}/></button>
                                    <h4 className="font-black uppercase text-blue-600 mb-1 text-xl">{r.empresa}</h4>
                                    <p className="text-[10px] font-bold text-slate-400 uppercase italic mb-6 leading-none">{r.unidade || 'Geral'}</p>
                                    <div className="bg-slate-50 p-6 rounded-[2rem] text-sm font-bold text-slate-600 italic leading-relaxed text-left">"{r.relato}"</div>
                                    <p className="mt-6 text-[9px] font-black uppercase text-blue-600 tracking-widest text-right opacity-30">Auditado RCH</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
