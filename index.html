<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enterprise RCH | Auditoria 360 & NR-1</title>
    
    <!-- Bibliotecas de Alta Disponibilidade -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0f172a; 
            margin: 0;
            color: #1e293b;
        }

        .glass-card { 
            background: #ffffff; 
            border-radius: 2rem; 
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-rch { 
            width: 100%; 
            padding: 1.1rem; 
            background-color: #f1f5f9; 
            border-radius: 1rem; 
            border: 2px solid transparent; 
            font-weight: 700; 
            text-transform: uppercase; 
            outline: none;
            transition: all 0.2s;
        }

        .input-rch:focus { border-color: #2563eb; background-color: white; }

        .btn-rch { 
            background-color: #2563eb; 
            color: white; 
            font-weight: 800; 
            padding: 1rem; 
            border-radius: 1rem; 
            text-transform: uppercase; 
            cursor: pointer;
            border: none;
            width: 100%;
        }

        .btn-rch:active { transform: scale(0.96); }

        .selo-nr1 {
            background: #065f46;
            color: white;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; }
            .report-box { border: 2px solid #000 !important; padding: 25px !important; margin-bottom: 40px !important; page-break-inside: avoid; background: white !important; }
            .signature-line { border-top: 2px solid #000; width: 250px; text-align: center; margin-top: 50px; font-weight: bold; font-size: 10px; }
        }

        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root">
        <div style="height: 100vh; display: flex; align-items: center; justify-content: center; color: white; background: #0f172a;">
            <div style="text-align: center;">
                <div style="width: 40px; height: 40px; border: 4px solid #2563eb; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
                <h2 style="font-family: sans-serif; font-weight: 900; letter-spacing: 2px;">RCH AUDITORIA</h2>
                <p style="font-size: 10px; opacity: 0.5; margin-top: 10px;">A INICIAR SISTEMA SEGURO...</p>
            </div>
        </div>
    </div>

    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Ícones em SVG Interno (Não falham nunca)
        const SvgShield = () => (
            <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="mx-auto text-blue-600"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        );
        const SvgFolder = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        );

        const firebaseConfig = {
            authDomain: "respeito-capital-humano-df.firebaseapp.com",
            projectId: "respeito-capital-humano-df",
            storageBucket: "respeito-capital-humano-df.firebasestorage.app",
            messagingSenderId: "1062425708099",
            appId: "1:1062425708099:web:260cfa86f5112a5b3cf6f6"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
        const DATA_PATH = 'artifacts/respeito-capital-humano-df/public/data';

        const App = () => {
            const [view, setView] = useState('welcome');
            const [companies, setCompanies] = useState([]);
            const [reports, setReports] = useState([]);
            const [search, setSearch] = useState('');
            const [activeCompany, setActiveCompany] = useState(null);
            const [adminPass, setAdminPass] = useState('');
            const [loading, setLoading] = useState(false);
            const [adminTab, setAdminTab] = useState('reports');
            const [lastProtocol, setLastProtocol] = useState('');
            const [qrComp, setQrComp] = useState(null);
            const [isIdentified, setIsIdentified] = useState(false);
            const [expandedEmp, setExpandedEmp] = useState(null);

            useEffect(() => {
                firebase.auth().signInAnonymously().then(() => {
                    db.collection(`${DATA_PATH}/companies`).onSnapshot(s => setCompanies(s.docs.map(d => ({id: d.id, ...d.data()}))));
                    db.collection(`${DATA_PATH}/reports`).onSnapshot(s => setReports(s.docs.map(d => ({id: d.id, ...d.data()}))));
                });
            }, []);

            const results = useMemo(() => {
                const t = search.toLowerCase().trim();
                return t.length >= 2 ? companies.filter(c => c.name.toLowerCase().includes(t)) : [];
            }, [search, companies]);

            const handleRelato = async (e) => {
                e.preventDefault();
                setLoading(true);
                const fd = new FormData(e.target);
                const prot = 'RCH-' + Math.random().toString(36).substring(2, 7).toUpperCase();
                try {
                    await db.collection(`${DATA_PATH}/reports`).add({
                        protocolo: prot,
                        empresaName: activeCompany.name,
                        empresaId: activeCompany.id,
                        unidade: fd.get('unidade'),
                        dataOcorrencia: fd.get('dataOcorrencia'),
                        identidade: isIdentified ? 'IDENTIFICADO' : 'ANÓNIMO',
                        nomeRelator: fd.get('nomeRelator') || 'CONFIDENCIAL',
                        relato: fd.get('relato'),
                        contato: fd.get('contato') || 'NENHUM',
                        status: 'ABERTO',
                        dataProtocolo: new Date().toISOString()
                    });
                    setLastProtocol(prot);
                    setView('success');
                } catch (e) { alert("Falha na ligação."); }
                setLoading(false);
            };

            const updateField = async (id, data) => {
                await db.collection(`${DATA_PATH}/reports`).doc(id).update(data);
            };

            const genQR = (c) => {
                setQrComp(c);
                setTimeout(() => {
                    document.getElementById("qr-area").innerHTML = "";
                    new QRCode(document.getElementById("qr-area"), { text: window.location.href, width: 200, height: 200 });
                }, 200);
            };

            // --- TELAS ---

            if (view === 'welcome') return (
                <div className="min-h-screen flex items-center justify-center p-6 animate-fade bg-slate-900">
                    <div className="max-w-xl w-full glass-card text-center relative">
                        <div className="flex justify-center gap-2 mb-8">
                            <div className="selo-nr1">NR-1 VALIDADA</div>
                            <div className="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-[10px] font-black uppercase shadow-lg">CERTIFICADO RCH</div>
                        </div>
                        <SvgShield />
                        <h1 className="text-2xl font-black uppercase italic tracking-tighter text-slate-900 mb-4 mt-4">Respeito ao Capital Humano</h1>
                        
                        <div className="bg-slate-50 p-6 rounded-2xl mb-10 border-l-4 border-emerald-500 text-left italic text-[11px] text-slate-500 leading-relaxed">
                            "NR-1 Item 1.4.1 g): O empregador deve estabelecer mecanismos para que os trabalhadores comuniquem situações de riscos."
                        </div>

                        <div className="text-left space-y-4">
                            <label className="text-[10px] font-black uppercase text-slate-400 ml-4">Pesquisa de Empresa Cliente:</label>
                            <input type="text" placeholder="Digite o nome..." className="input-rch shadow-lg" value={search} onChange={e => setSearch(e.target.value)} />
                            <div className="space-y-3 pt-2">
                                {results.map(c => (
                                    <button key={c.id} onClick={() => { setActiveCompany(c); setView('form'); }} className="w-full bg-white border border-slate-100 p-5 rounded-2xl flex items-center justify-between hover:bg-blue-600 hover:text-white transition-all shadow-sm">
                                        <div className="text-left leading-none"><span className="font-black uppercase text-sm">{c.name}</span><p className="text-[8px] font-black mt-1 opacity-40 uppercase">Canal Auditado NR-1</p></div>
                                        <span className="font-bold">➔</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                        <button onClick={() => setView('admin-login')} className="mt-14 text-[10px] font-black text-slate-300 uppercase italic">Acesso Auditoria</button>
                    </div>
                </div>
            );

            if (view === 'form') return (
                <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
                    <div className="max-w-xl w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden text-left">
                        <header className="bg-slate-900 p-8 text-white flex justify-between items-center text-left leading-none">
                            <div className="text-left leading-none"><h2 className="text-xl font-black uppercase text-left leading-none">{activeCompany.name}</h2><p className="text-[9px] text-blue-400 font-bold uppercase mt-2 tracking-widest italic leading-none">Protocolo Ético de SST</p></div>
                            <button onClick={() => setView('welcome')} className="text-white text-2xl font-bold">✕</button>
                        </header>
                        <form onSubmit={handleRelato} className="p-8 space-y-6 text-left">
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="text-[10px] font-black text-slate-400 mb-1 block italic ml-2">Unidade *</label><input name="unidade" required className="input-rch" /></div>
                                <div><label className="text-[10px] font-black text-slate-400 mb-1 block italic ml-2">Data *</label><input type="date" name="dataOcorrencia" required className="input-rch" /></div>
                            </div>
                            <div className="bg-slate-50 p-6 rounded-2xl space-y-4">
                                <p className="text-[10px] font-black text-slate-400 uppercase italic ml-2">Identidade</p>
                                <div className="flex gap-4">
                                    <button type="button" onClick={() => setIsIdentified(false)} className={`flex-1 py-3 rounded-xl font-black text-[10px] ${!isIdentified ? 'bg-blue-600 text-white' : 'bg-white text-slate-400'}`}>Anónimo</button>
                                    <button type="button" onClick={() => setIsIdentified(true)} className={`flex-1 py-3 rounded-xl font-black text-[10px] ${isIdentified ? 'bg-blue-600 text-white' : 'bg-white text-slate-400'}`}>Identificado</button>
                                </div>
                                {isIdentified && <input name="nomeRelator" required className="input-rch bg-white" placeholder="Seu Nome Completo" />}
                            </div>
                            <textarea name="relato" required className="input-rch h-48 normal-case font-medium text-sm leading-relaxed" placeholder="Descreva os factos detalhadamente..."></textarea>
                            <button type="submit" disabled={loading} className="btn-rch py-5 text-lg shadow-xl">{loading ? "Processando..." : "Protocolar Denúncia"}</button>
                        </form>
                    </div>
                </div>
            );

            if (view === 'success') return (
                <div className="h-screen flex flex-col items-center justify-center text-center p-10 bg-slate-900 text-white">
                    <h2 className="text-5xl font-black uppercase italic mb-4">Recebido</h2>
                    <div className="bg-white p-10 rounded-[3rem] mb-12 shadow-2xl scale-110">
                        <p className="text-[10px] text-slate-400 mb-2 uppercase font-black">Código RCH</p>
                        <p className="text-5xl font-black text-blue-600 tracking-tighter">{lastProtocol}</p>
                    </div>
                    <button onClick={() => window.location.reload()} className="btn-rch max-w-xs py-5">Finalizar</button>
                </div>
            );

            if (view === 'admin-login') return (
                <div className="h-screen flex items-center justify-center p-6 bg-slate-900">
                    <div className="max-w-xs w-full glass-card text-center">
                        <h2 className="text-xl font-black uppercase italic mb-8">Painel Auditora</h2>
                        <input type="password" className="input-rch text-center text-4xl mb-10 tracking-[0.4em] font-black" placeholder="••••" value={adminPass} onChange={e => setAdminPass(e.target.value)} />
                        <button onClick={() => adminPass === 'df2026' ? setView('admin-dash') : alert("Palavra-passe errada")} className="btn-rch py-4">Aceder</button>
                        <button onClick={() => setView('welcome')} className="mt-8 text-[9px] font-black text-slate-400 uppercase italic">Voltar</button>
                    </div>
                </div>
            );

            if (view === 'admin-dash') return (
                <div className="min-h-screen bg-slate-50 text-slate-900 p-6 text-left">
                    <header className="max-w-7xl mx-auto flex justify-between items-center mb-10 no-print text-left leading-none">
                        <div className="text-left flex items-center gap-4">
                            <div className="bg-slate-900 p-2.5 rounded-xl text-white"><SvgShield /></div>
                            <div className="text-left leading-none">
                                <h2 className="text-xl font-black uppercase leading-none">Auditoria RCH 360</h2>
                                <p className="text-[10px] text-blue-600 font-bold uppercase mt-1">Consola Daiana Freitas</p>
                            </div>
                        </div>
                        <div className="flex gap-2">
                             <button onClick={() => setAdminTab('reports')} className={`px-5 py-2 rounded-xl font-black text-[9px] uppercase ${adminTab === 'reports' ? 'bg-blue-600 text-white' : 'bg-white shadow-sm'}`}>Relatos</button>
                             <button onClick={() => setAdminTab('companies')} className={`px-5 py-2 rounded-xl font-black text-[9px] uppercase ${adminTab === 'companies' ? 'bg-blue-600 text-white' : 'bg-white shadow-sm'}`}>Empresas</button>
                             <button onClick={() => setView('welcome')} className="bg-red-50 text-red-600 px-5 py-2 rounded-xl font-black text-[9px] uppercase italic">Sair</button>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto text-left">
                        {adminTab === 'companies' && (
                            <div className="bg-white p-8 rounded-[2rem] shadow-sm text-left no-print border border-slate-200">
                                <h3 className="text-[10px] font-black uppercase text-slate-400 mb-8">Ativar Novo Canal Cliente</h3>
                                <form onSubmit={async (e) => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
                                    await db.collection(`${DATA_PATH}/companies`).add({
                                        name: fd.get('nome').toUpperCase(),
                                        vencimento: fd.get('vencimento')
                                    });
                                    e.target.reset();
                                    alert("Canal Ativado!");
                                }} className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <input name="nome" required className="input-rch" placeholder="NOME DA EMPRESA" />
                                    <input type="date" name="vencimento" required className="input-rch" />
                                    <button type="submit" className="btn-rch py-4">Ativar</button>
                                </form>
                                <div className="grid md:grid-cols-3 gap-4 mt-10">
                                    {companies.map(c => (
                                        <div key={c.id} className="bg-slate-50 p-6 rounded-2xl border flex justify-between items-center group">
                                            <div className="text-left leading-none"><span className="text-[11px] font-black uppercase">{c.name}</span><p className="text-[8px] mt-1 opacity-50 font-bold uppercase">Expira: {new Date(c.vencimento).toLocaleDateString()}</p></div>
                                            <div className="flex gap-2">
                                                <button onClick={() => genQR(c)} className="p-2 bg-white rounded-lg border">QR</button>
                                                <button onClick={() => db.collection(`${DATA_PATH}/companies`).doc(c.id).delete()} className="text-red-500 font-bold p-2">✕</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {adminTab === 'reports' && (
                            <div className="space-y-8 text-left">
                                <div className="flex justify-end no-print"><button onClick={() => window.print()} className="bg-slate-900 text-white px-8 py-4 rounded-xl font-black text-[10px] uppercase shadow-xl">Imprimir Relatórios PDF</button></div>
                                
                                {companies.map(emp => {
                                    const empReports = reports.filter(r => r.empresaId === emp.id || r.empresaName === emp.name);
                                    if(empReports.length === 0) return null;

                                    return (
                                        <div key={emp.id} className="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden mb-10 text-left no-print-section">
                                            <button onClick={() => setExpandedEmp(expandedEmp === emp.id ? null : emp.id)} className="w-full p-8 flex items-center justify-between hover:bg-slate-50 no-print text-left">
                                                <div className="flex items-center gap-4 text-left leading-none"><div className="bg-blue-600 p-2.5 rounded-xl text-white"><SvgFolder /></div><div className="text-left leading-none"><h3 className="text-xl font-black uppercase text-left leading-none">{emp.name}</h3><p className="text-[10px] font-bold text-slate-400 mt-2 uppercase tracking-widest text-left">{empReports.length} Ocorrências</p></div></div>
                                                <span className="font-bold">{expandedEmp === emp.id ? '▲' : '▼'}</span>
                                            </button>

                                            <div className={`${expandedEmp === emp.id ? 'block' : 'hidden'} md:block p-10 pt-0 space-y-12 text-left`}>
                                                {empReports.map(r => (
                                                    <div key={r.id} className="bg-slate-50 p-10 md:p-14 rounded-[3rem] border-l-[25px] border-blue-600 relative report-box text-left print:border-l-0 print:p-0">
                                                        <div className="flex flex-col md:flex-row justify-between items-start gap-8 mb-10 border-b pb-10">
                                                            <div className="text-left leading-none flex-1">
                                                                <div className="flex items-center gap-4 mb-4 leading-none"><span className={`px-4 py-1 rounded-full text-[9px] font-black uppercase ${r.status === 'CONCLUÍDO' ? 'bg-emerald-100 text-emerald-600' : 'bg-blue-100 text-blue-600'}`}>STATUS: {r.status}</span><span className="text-[9px] font-black text-slate-900 bg-slate-200 px-4 py-1 rounded-xl">PROT: {r.protocolo}</span></div>
                                                                <h4 className="text-4xl font-black uppercase tracking-tighter text-slate-900 leading-none mb-8 text-left">{emp.name}</h4>
                                                                
                                                                <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 space-y-4 no-print text-left">
                                                                    <h5 className="text-[10px] font-black uppercase text-blue-600 flex items-center gap-2">1. Início de Inquérito Auditoria</h5>
                                                                    <div className="grid grid-cols-3 gap-6 text-left">
                                                                        <div><label className="text-[8px] font-black uppercase text-slate-400 mb-1 block ml-2">Nº Ocorrência</label><input className="input-rch h-10 py-0 text-xs shadow-inner" placeholder="Ex: 001/26" defaultValue={r.numOcorrencia} onBlur={(e) => updateField(r.id, { numOcorrencia: e.target.value })} /></div>
                                                                        <div><label className="text-[8px] font-black uppercase text-slate-400 mb-1 block ml-2">Abertura</label><input type="date" className="input-rch h-10 py-0 text-xs shadow-inner" defaultValue={r.dataAberturaAdmin} onBlur={(e) => updateField(r.id, { dataAberturaAdmin: e.target.value, status: 'EM ANÁLISE' })} /></div>
                                                                        <div><label className="text-[8px] font-black uppercase text-slate-400 mb-1 block ml-2">Prazo</label><input type="date" className="input-rch h-10 py-0 text-xs shadow-inner" defaultValue={r.prazoFechamento} onBlur={(e) => updateField(r.id, { prazoFechamento: e.target.value })} /></div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                            <button onClick={() => db.collection(`${DATA_PATH}/reports`).doc(r.id).delete()} className="text-red-500 no-print font-bold uppercase text-[10px]">✕ Eliminar</button>
                                                        </div>

                                                        <div className="grid md:grid-cols-3 gap-10 mb-10 text-left leading-none">
                                                            <div className="md:col-span-2 space-y-8 text-left leading-none">
                                                                <div className="bg-white p-8 rounded-3xl border text-left shadow-sm"><p className="text-[10px] font-black text-slate-400 uppercase mb-4 italic text-left">Relato do Funcionário:</p><p className="text-lg font-bold text-slate-700 italic leading-relaxed text-left">"{r.relato}"</p></div>
                                                                <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 space-y-6 text-left no-print">
                                                                    <h5 className="text-[10px] font-black uppercase text-emerald-600 leading-none">2. Parecer de Encerramento Auditoria</h5>
                                                                    <div className="space-y-4 text-left">
                                                                        <input type="date" className="input-rch h-12 text-xs shadow-inner" defaultValue={r.dataFechamentoAdmin} onBlur={(e) => updateField(r.id, { dataFechamentoAdmin: e.target.value, status: 'CONCLUÍDO' })} />
                                                                        <textarea className="input-rch h-24 py-4 text-xs shadow-inner normal-case font-medium" placeholder="Escreva a conclusão técnica aqui..." defaultValue={r.conclusaoTecnica} onBlur={(e) => updateField(r.id, { conclusaoTecnica: e.target.value })}></textarea>
                                                                    </div>
                                                                </div>
                                                            </div>

                                                            <div className="bg-slate-900 p-8 rounded-[3rem] text-white text-left flex flex-col justify-between shadow-xl leading-none h-full">
                                                                <div className="space-y-6 text-left leading-none">
                                                                    <p className="text-[10px] font-black text-blue-400 uppercase italic tracking-widest text-left">Inquérito Auditoria</p>
                                                                    <div className="space-y-6 text-left leading-none">
                                                                        <div className="text-left leading-none"><p className="text-[8px] opacity-40 uppercase leading-none mb-1 text-left">Identidade</p><p className="text-xs font-black text-left leading-none">{r.identidade}</p>{r.identidade === 'IDENTIFICADO' && <p className="text-[10px] text-blue-400 font-bold mt-1 uppercase text-left">{r.nomeRelator}</p>}</div>
                                                                        <div className="text-left leading-none"><p className="text-[8px] opacity-40 uppercase leading-none mb-1 text-left">Unidade/Fato</p><p className="text-xs font-black text-left leading-none">{r.unidade}</p><p className="text-[10px] text-slate-300 mt-1 italic text-left leading-none">{new Date(r.dataOcorrencia).toLocaleDateString()}</p></div>
                                                                        <div className="text-left leading-none"><p className="text-[8px] opacity-40 uppercase leading-none mb-1 text-left">Feedback Resposta</p><p className="text-xs font-black text-emerald-400 text-left leading-none">{r.contato}</p></div>
                                                                    </div>
                                                                </div>
                                                                <div className="mt-8 pt-6 border-t border-white/10 opacity-30 italic text-[8px] text-left">Auditado RCH Enterprise</div>
                                                            </div>
                                                        </div>

                                                        {/* ÁREA DE ASSINATURA NO PDF */}
                                                        <div className="hidden print:block mt-16 p-10 border-2 border-slate-900 rounded-[3rem] text-left leading-none">
                                                            <h5 className="text-[12px] font-black uppercase underline mb-8 text-left">Dossiê Consolidado de Auditoria NR-1</h5>
                                                            <div className="grid grid-cols-2 gap-10 text-[10px] font-bold uppercase text-left leading-none">
                                                                <div className="space-y-4 text-left leading-none"><p className="text-left leading-none opacity-50">Nº Ocorrência: {r.numOcorrencia || '---'}</p><p className="text-left leading-none opacity-50">Data Abertura: {r.dataAberturaAdmin ? new Date(r.dataAberturaAdmin).toLocaleDateString() : '---'}</p><p className="text-left leading-none opacity-50">Prazo Estimado: {r.prazoFechamento ? new Date(r.prazoFechamento).toLocaleDateString() : '---'}</p></div>
                                                                <div className="space-y-4 text-left leading-none"><p className="text-left leading-none opacity-50">Encerramento: {r.dataFechamentoAdmin ? new Date(r.dataFechamentoAdmin).toLocaleDateString() : '---'}</p><p className="text-left leading-none italic font-black text-blue-600">Protocolo Digital: {r.protocolo}</p></div>
                                                            </div>
                                                            <div className="mt-10 pt-8 border-t border-slate-100 text-left leading-none"><p className="text-[10px] font-black uppercase text-slate-400 mb-4 italic text-left leading-none">Parecer Técnico:</p><p className="text-sm italic font-medium leading-relaxed text-left">"{r.conclusaoTecnica || 'Em análise técnica.'}"</p></div>
                                                            <div className="flex justify-between items-end mt-20 text-center leading-none">
                                                                <div className="flex flex-col items-center leading-none"><div className="signature-line"></div><p className="text-[10px] font-black uppercase mt-4 italic leading-none">Daiana Freitas (RCH)</p></div>
                                                                <div className="flex flex-col items-center leading-none"><div className="signature-line"></div><p className="text-[10px] font-black uppercase mt-4 italic leading-none">Compliance Empresa</p></div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </main>

                    {qrComp && (
                        <div className="fixed inset-0 bg-slate-900/95 flex items-center justify-center p-6 z-50 no-print">
                            <div className="bg-white p-12 rounded-[3.5rem] text-center animate-fade max-w-sm w-full shadow-2xl">
                                <h3 className="text-2xl font-black uppercase italic mb-8 leading-none">{qrComp.name}</h3>
                                <div id="qr-area" className="mb-10 inline-block border-8 border-slate-50 p-4 rounded-[2rem]"></div>
                                <div className="flex gap-4"><button onClick={() => window.print()} className="btn-rch bg-slate-900">Imprimir</button><button onClick={() => setQrComp(null)} className="btn-rch bg-red-50 text-red-600">Fechar</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
